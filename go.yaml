apiVersion: apps/v1
kind: Deployment

metadata:
  name: go-api
  labels:
    nome: go

spec:
  replicas: 3

  selector:
    matchLabels:
      nome: go

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        nome: go

    spec:
      restartPolicy: Always

      containers:
        - name: go

          image: evertonhls/curso-ci-4-projeto-inicial:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: dbhost
                  key: HOST

            - name: DBPORT
              valueFrom:
                secretKeyRef:
                  name: dbport
                  key: DBPORT

            - name: USER
              valueFrom:
                secretKeyRef:
                  name: dbuser
                  key: USER

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dbpassword
                  key: PASSWORD

            - name: DBNAME
              valueFrom:
                secretKeyRef:
                  name: dbname
                  key: DBNAME

            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: port
                  key: PORT

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
