apiVersion: apps/v1
kind: Deployment

metadata:
  name: go-api
  labels:
    nome: go

spec:
  replicas: 2

  revisionHistoryLimit: 3

  progressDeadlineSeconds: 600

  selector:
    matchLabels:
      nome: go

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        nome: go

    spec:
      restartPolicy: Always

      terminationGracePeriodSeconds: 30

      containers:
        - name: go

          image: evertonhls/curso-ci-4-projeto-inicial:latest

          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP


          env:

            - name: HOST
              valueFrom:
                secretKeyRef:
                  name: dbhost
                  key: HOST

            - name: DBPORT
              valueFrom:
                secretKeyRef:
                  name: dbport
                  key: DBPORT

            - name: USER
              valueFrom:
                secretKeyRef:
                  name: dbuser
                  key: USER

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dbpassword
                  key: PASSWORD

            - name: DBNAME
              valueFrom:
                secretKeyRef:
                  name: dbname
                  key: DBNAME

            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: port
                  key: PORT


          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"


          startupProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5

            failureThreshold: 30


          readinessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

            successThreshold: 1
            failureThreshold: 3


          livenessProbe:
            httpGet:
              path: /
              port: http

            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5

            failureThreshold: 3
